<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f2f2f7" id="theme-meta" />
  <meta name="description" content="Calculator – Modern Currency Calculator PWA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css" />
  


  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>


</head>

<body>

  <div class="app-card">

    <!-- Header -->
    <div class="app-header">
      <span class="app-logo">CalcFX</span>

      <button
        class="theme-toggle"
        id="theme-toggle"
        aria-label="Toggle theme"
        onclick="toggleTheme()"
      >
        <span class="toggle-icons">
          <i class="bi bi-sun-fill"></i>
          <i class="bi bi-moon-fill"></i>
        </span>
      </button>
    </div>

    <!-- Currency swap row -->
    <div class="currency-row" style="margin-top: 16px;">
      <i class="bi bi-arrow-down-up"></i>
      <i class="bi bi-chevron-down"></i>
    </div>

    <!-- Display -->
    <div class="display-panel">
      <div class="display-primary">
        <span class="display-value" id="display">1,000</span>
        <span class="display-currency">CZK</span>
      </div>
      <div class="display-secondary">
        <span class="display-converted" id="converted">339.21</span>
        <span class="display-currency-2">GTQ</span>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Keypad -->
    <div class="keypad">

      <!-- Row 1: AC  ±  %  × -->
      <button class="btn btn-fn" onclick="action('AC')">AC</button>
      <button class="btn btn-fn" onclick="action('±')">
        <i class="bi bi-plus-slash-minus"></i>
      </button>
      <button class="btn btn-fn" onclick="action('%')">%</button>
      <button class="btn btn-op" onclick="action('×')">×</button>

      <!-- Row 2: 7  8  9  ÷ -->
      <button class="btn btn-num" onclick="action('7')">7</button>
      <button class="btn btn-num" onclick="action('8')">8</button>
      <button class="btn btn-num" onclick="action('9')">9</button>
      <button class="btn btn-op" onclick="action('÷')">÷</button>

      <!-- Row 3: 4  5  6  − -->
      <button class="btn btn-num" onclick="action('4')">4</button>
      <button class="btn btn-num" onclick="action('5')">5</button>
      <button class="btn btn-num" onclick="action('6')">6</button>
      <button class="btn btn-op" onclick="action('-')">−</button>

      <!-- Row 4: 1  2  3  + -->
      <button class="btn btn-num" onclick="action('1')">1</button>
      <button class="btn btn-num" onclick="action('2')">2</button>
      <button class="btn btn-num" onclick="action('3')">3</button>
      <button class="btn btn-op" onclick="action('+')">+</button>

      <!-- Row 5: 🧮  0  .  = -->
      <button class="btn btn-fn" onclick="action('icon')" style="font-size:16px;">
        <i class="bi bi-calculator"></i>
      </button>
      <button class="btn btn-num" onclick="action('0')">0</button>
      <button class="btn btn-num" onclick="action('.')">.</button>
      <button class="btn btn-eq" onclick="action('=')">=</button>

    </div>

    <!-- Home bar -->
    <div class="home-bar"></div>

  </div>

  <!-- PWA Install Banner -->
  <div id="pwa-banner">
    <i class="bi bi-phone" style="color: var(--accent);"></i>
    <span>Install CalcFX</span>
    <button class="install-btn" onclick="installPWA()">Install</button>
    <button class="close-btn" onclick="document.getElementById('pwa-banner').style.display='none'">
      <i class="bi bi-x"></i>
    </button>
  </div>
<script src="script.js"></script>
</body>
</html>
